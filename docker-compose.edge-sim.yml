version: "3.9"

# ============================================================================
# Edge Simulation Override — 8GB Total Memory Constraint
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.edge-sim.yml up -d
#
# Memory Budget (from paper Table 2):
#   Qwen3-4B Q4_K_M  : 2.3 GB  → llama service
#   KV Cache (ctx 32K): 1.0 GB  → llama service (included)
#   Qdrant            : 1.5 GB  → qdrant service
#   FalkorDB          : 0.75 GB → falkordb service
#   Embedding model   : 0.45 GB → api service (loaded in-process)
#   OS + App          : 1.0 GB  → api service
#   ──────────────────────────
#   Total             : 7.0 GB  (headroom ~1 GB)
# ============================================================================

services:
  qdrant:
    deploy:
      resources:
        limits:
          memory: 1536M      # 1.5 GB — paper Table 2
        reservations:
          memory: 512M

  falkordb:
    deploy:
      resources:
        limits:
          memory: 768M       # 0.75 GB — paper Table 2
        reservations:
          memory: 256M
    environment:
      FALKORDB_ARGS: "--maxmemory 512mb"

  llama:
    deploy:
      resources:
        limits:
          memory: 3584M      # 3.3 GB (2.3 weights + 1.0 KV cache) — paper Table 2
        reservations:
          memory: 2048M
    command:
      - --model
      - ${LLAMA_MODEL_PATH:-/models/Qwen3-4B-Q4_K_M.gguf}
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --ctx-size
      - ${LLAMA_CTX_SIZE:-8192}
      - --parallel
      - ${LLAMA_PARALLEL:-1}    # Edge: single slot to constrain memory
      - --cont-batching
      - --n-gpu-layers
      - ${GPU_LAYERS:--1}

  api:
    deploy:
      resources:
        limits:
          memory: 1536M      # 1.0 GB OS/App + 0.45 GB embedding — paper Table 2
        reservations:
          memory: 768M
